<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Chi Tiêu Vani & Ivy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Quỹ chung</p>
                <h1>Chi tiêu Vani & Ivy</h1>
            </div>

            <div class="month-control">
                <label for="monthFilter">Tháng</label>
                <select id="monthFilter"></select>
            </div>
        </header>

        <div class="main-layout">

            <!-- LEFT -->
            <div class="left-col">

                <div class="input-section">
                    <div class="form-title">
                        <h3 id="formTitle">Nhập chi tiêu mới</h3>
                        <button id="cancelEditBtn" class="text-button" type="button" hidden>Hủy sửa</button>
                    </div>

                    <div class="field-grid">
                        <label class="field">
                            <span>Người thanh toán</span>
                            <select id="payer">
                                <option value="Vani">Vani thanh toán</option>
                                <option value="Ivy">Ivy thanh toán</option>
                            </select>
                        </label>

                        <label class="field">
                            <span>Danh mục</span>
                            <select id="category">
                                <option value="Ăn uống">Ăn uống</option>
                                <option value="Mèo">Mèo</option>
                                <option value="Xăng xe">Xăng xe</option>
                                <option value="Thiết yếu">Thiết yếu</option>
                                <option value="Cố định">Cố định</option>
                                <option value="Ăn ngoài">Ăn ngoài</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </label>
                    </div>

                    <label class="field">
                        <span>Nội dung</span>
                        <input 
                            type="text" 
                            id="description" 
                            placeholder="Ví dụ: Coopmart, tiền điện..."
                            autocomplete="off"
                        >
                    </label>

                    <div class="field-grid">
                        <label class="field">
                            <span>Số tiền</span>
                            <input 
                                type="text" 
                                id="amount" 
                                placeholder="120.000"
                                inputmode="numeric"
                                autocomplete="off"
                            >
                        </label>

                        <label class="field">
                            <span>Ngày</span>
                            <input type="date" id="date">
                        </label>
                    </div>

                    <button id="submitBtn" type="button">Ghi nhận</button>
                    <p id="statusMessage" class="status-message" aria-live="polite"></p>
                </div>

            </div>

            <!-- RIGHT -->
            <div class="right-col">
                <div class="summary-card">
                    <h3>Báo cáo chi tiêu</h3>

                    <div class="metrics-grid">
                        <div class="metric">
                            <span>Tổng tháng</span>
                            <strong id="grandTotal">0đ</strong>
                        </div>
                        <div class="metric">
                            <span>Vani đã chi</span>
                            <strong id="vaniTotal">0đ</strong>
                        </div>
                        <div class="metric">
                            <span>Ivy đã chi</span>
                            <strong id="ivyTotal">0đ</strong>
                        </div>
                    </div>

                    <div id="balanceStatus" class="balance-pill">Đang hòa nhau</div>
                </div>

                <div class="budget-card">
                    <h3>Báo cáo danh mục</h3>

                    <div id="budgetList"></div>
                </div>

            </div>

        </div>

        <section class="history-section">
            <div class="section-title">
                <h3>Lịch sử chi tiêu</h3>
                <span id="transactionCount">0 khoản</span>
            </div>

            <p id="historyEmpty" class="empty-state">Chưa có khoản chi nào trong tháng này.</p>
            <ul id="historyList"></ul>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
